<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>도구 모음 - Lena's Tools</title>
<meta name="description" content="설치·로그인 없이 브라우저에서 바로 쓰는 무료 웹 도구 모음. 글자 수 세기 등.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#3D6B5E">
<link rel="canonical" href="https://hanariago.github.io/tools-hub/">

<meta property="og:type" content="website">
<meta property="og:title" content="도구 모음 - Lena's Tools">
<meta property="og:description" content="설치·로그인 없이 브라우저에서 바로 쓰는 무료 웹 도구 모음.">
<meta property="og:url" content="https://hanariago.github.io/tools-hub/">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%233D6B5E'/%3E%3Ctext x='50' y='70' font-size='52' text-anchor='middle' fill='white' font-family='sans-serif'%3E🔧%3C/text%3E%3C/svg%3E">

<style>
  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E0DDD6;
    --text-primary: #1A1814;
    --text-secondary: #6B6660;
    --text-muted: #A8A49E;
    --accent: #3D6B5E;
    --accent-light: #EBF2EF;
    --accent-mid: #5A9A8A;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 16px 64px;
  }
  header { text-align: center; margin-bottom: 40px; }
  .title { font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: var(--text-muted); letter-spacing: 0.02em; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    width: 100%;
    max-width: 760px;
  }
  .tool-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 22px 22px 20px;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
  }
  .tool-card:hover {
    transform: translateY(-2px);
    border-color: #B8D6CE;
    box-shadow: 0 4px 14px rgba(0,0,0,0.09);
  }
  .tool-emoji { font-size: 30px; line-height: 1; margin-bottom: 12px; }
  .tool-name { font-size: 18px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -0.3px; }
  .tool-name .en { font-size: 12px; font-weight: 500; color: var(--text-muted); margin-left: 6px; }
  .tool-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .tool-go { margin-top: 14px; font-size: 12px; font-weight: 600; color: var(--accent); }

  .empty { color: var(--text-muted); font-size: 14px; text-align: center; padding: 40px; }

  footer { margin-top: 44px; font-size: 12px; color: var(--text-muted); text-align: center; letter-spacing: 0.03em; line-height: 1.8; }
  footer a { color: var(--text-secondary); text-decoration: none; border-bottom: 1px solid var(--border); }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="title">🔧 도구 모음</div>
  <div class="subtitle">설치·로그인 없이 브라우저에서 바로 쓰는 무료 웹 도구</div>
</header>

<main class="grid" id="grid">
  <div class="empty">불러오는 중…</div>
</main>

<footer>
  <div>Made by <a href="https://x.com/thezenvoid" target="_blank" rel="noopener">Lena</a> · 오픈소스 (MIT)</div>
</footer>

<script>
  function card(t) {
    var en = t.name_en ? '<span class="en">' + t.name_en + '</span>' : '';
    return '<a class="tool-card" href="' + t.url + '">' +
      '<div class="tool-emoji">' + (t.emoji || '🔧') + '</div>' +
      '<div class="tool-name">' + t.name + en + '</div>' +
      '<div class="tool-desc">' + (t.desc || '') + '</div>' +
      '<div class="tool-go">바로 쓰기 →</div>' +
      '</a>';
  }

  fetch('./tools.json', { cache: 'no-cache' })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var live = (data.tools || []).filter(function (t) { return t.status === 'live'; });
      var grid = document.getElementById('grid');
      grid.innerHTML = live.length
        ? live.map(card).join('')
        : '<div class="empty">아직 공개된 도구가 없습니다.</div>';
    })
    .catch(function () {
      document.getElementById('grid').innerHTML =
        '<div class="empty">목록을 불러오지 못했습니다.</div>';
    });
</script>

</body>
</html>
